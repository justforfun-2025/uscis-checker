name: USCISChecker
options:
  bundleIdPrefix: com.uscischecker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  USCISChecker:
    type: application
    platform: iOS
    sources:
      - path: USCISChecker
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uscischecker.USCISChecker
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        INFOPLIST_FILE: USCISChecker/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"

  USCISCheckerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: USCISCheckerTests
    dependencies:
      - target: USCISChecker
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
